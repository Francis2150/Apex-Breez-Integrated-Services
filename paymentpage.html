<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make Payment — Apex Breez Integrated Services</title>
  <meta name="description" content="Pay securely for Apex Breez services using Mobile Money, Visa, or Mastercard.">

  <link rel="icon" href="images/icon/updatedmylogo3.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #F5F7FA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1rem;
      margin: 0;
      color: #444444;
      -webkit-font-smoothing: antialiased;
    }

    /* Back link */
    .pay-back-link {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #0B1F3B;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      background: #FFFFFF;
      border: 1px solid #E0E4EA;
      border-radius: 6px;
      transition: all 0.3s;
      z-index: 100;
    }
    .pay-back-link:hover {
      border-color: #D4A843;
      color: #D4A843;
      box-shadow: 0 2px 12px rgba(212,168,67,0.15);
    }

    .topup-container {
      width: 100%;
      max-width: 520px;
    }

    .topup-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(11,31,59,0.08);
      overflow: hidden;
      border: 1px solid #E8C36A;
    }

    /* Header — Apex Breez navy-to-teal gradient */
    .topup-card-header {
      background: linear-gradient(135deg, #0B1F3B, #085A4B);
      color: #fff;
      padding: 1.75rem 1.5rem;
      text-align: center;
      position: relative;
    }
    .topup-card-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #D4A843;
    }
    .topup-card-header .header-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(212,168,67,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 20px;
      color: #E8C36A;
    }
    .topup-card-header h4 {
      margin: 0 0 0.25rem;
      font-weight: 700;
      font-size: 1.15rem;
      color: #FFFFFF;
    }
    .topup-card-header p {
      margin: 0;
      opacity: 0.8;
      font-size: 0.85rem;
      color: #FFFFFF;
    }

    .topup-card-body {
      padding: 1.5rem;
    }

    /* Form Fields */
    .pay-form-group {
      margin-bottom: 1.15rem;
    }
    .pay-form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #0B1F3B;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pay-required { color: #D4A843; }

    /* Standalone inputs & selects */
    .pay-form-group > input:not(.input-group-text),
    .pay-form-group > .select-wrapper > select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 2px solid #E0E4EA;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #0B1F3B;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      font-family: inherit;
      box-sizing: border-box;
    }
    .pay-form-group > input:not(.input-group-text):focus,
    .pay-form-group > .select-wrapper > select:focus {
      border-color: #D4A843;
      box-shadow: 0 0 0 3px rgba(212,168,67,0.12);
    }
    .pay-form-group > input:not(.input-group-text)::placeholder {
      color: #adb5bd;
      font-size: 0.85rem;
    }

    /* Custom select arrow */
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '\f107';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #6c757d;
      pointer-events: none;
      font-size: 0.85rem;
    }
    .select-wrapper > select {
      padding-right: 2.5rem !important;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    /* Input Group — GHS prefix, +233 prefix */
    .pay-input-group {
      display: flex;
      align-items: stretch;
    }
    .pay-input-group .pay-input-prefix {
      display: flex;
      align-items: center;
      padding: 0 0.85rem;
      background: rgba(212,168,67,0.06);
      border: 2px solid #E0E4EA;
      border-right: none;
      border-radius: 6px 0 0 6px;
      font-weight: 600;
      color: #0B1F3B;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pay-input-group:focus-within .pay-input-prefix {
      border-color: #D4A843;
    }
    .pay-input-group input {
      flex: 1;
      min-width: 0;
      padding: 0.65rem 0.85rem;
      border: 2px solid #E0E4EA;
      border-radius: 0 6px 6px 0;
      font-size: 0.9rem;
      color: #0B1F3B;
      background: #fff;
      outline: none;
      font-family: inherit;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .pay-input-group input:focus {
      border-color: #D4A843;
      box-shadow: 0 0 0 3px rgba(212,168,67,0.12);
      z-index: 1;
    }
    .pay-input-group input::placeholder {
      color: #adb5bd;
      font-size: 0.85rem;
    }

    /* Payment Methods */
    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #0B1F3B;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .payment-methods {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .payment-method {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border: 2px solid #E0E4EA;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      position: relative;
    }
    .payment-method:hover:not(.disabled) {
      border-color: #D4A843;
      background: rgba(212,168,67,0.03);
    }
    .payment-method.active {
      border-color: #D4A843;
      background: rgba(212,168,67,0.06);
    }
    .payment-method.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .payment-method .method-logos {
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }
    .payment-method img.method-img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
    }
    .card-brand {
      height: 28px;
      width: auto;
      flex-shrink: 0;
    }
    .payment-method .method-text {
      font-weight: 600;
      font-size: 0.88rem;
      color: #0B1F3B;
    }
    .coming-soon-badge {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: #6c757d;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
    }
    .method-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      color: #adb5bd;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .method-divider::before,
    .method-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E0E4EA;
    }
    .payment-method .radio-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #ccc;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .payment-method.active .radio-dot {
      border-color: #D4A843;
    }
    .payment-method.active .radio-dot::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #D4A843;
    }
    .payment-method.disabled .radio-dot {
      border-color: #ddd;
      background: #eee;
    }

    /* Process Button — Apex Breez gold */
    .btn-process {
      background: linear-gradient(135deg, #D4A843, #E8C36A);
      color: #0B1F3B;
      border: none;
      border-radius: 6px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-weight: 700;
      width: 100%;
      transition: all 0.3s;
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .btn-process:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212,168,67,0.4);
      color: #0B1F3B;
      background: linear-gradient(135deg, #c49938, #D4A843);
    }
    .btn-process:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* Loading Overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(11,31,59,0.6);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
    }
    .loading-overlay.active { display: flex; }
    .loading-overlay .spinner-border {
      width: 3rem;
      height: 3rem;
      border-width: 4px;
      color: #E8C36A;
    }
    .loading-overlay p {
      margin-top: 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #E8C36A;
    }

    /* Toast Notification */
    .toast-notification {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      color: #fff;
      font-weight: 500;
      font-size: 0.88rem;
      z-index: 10000;
      transform: translateX(120%);
      transition: transform 0.3s ease;
      max-width: 360px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .toast-notification.show { transform: translateX(0); }
    .toast-notification.success { background: #0A6E5C; }
    .toast-notification.error { background: #E74C3C; }
    .toast-notification.info { background: #0B1F3B; }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .pay-back-link {
        top: 0.75rem;
        left: 0.75rem;
        font-size: 12px;
        padding: 6px 12px;
      }
      .topup-card-body {
        padding: 1.25rem 1rem;
      }
      .payment-method {
        padding: 0.65rem 0.75rem;
        gap: 0.6rem;
      }
      .payment-method img.method-img {
        width: 34px;
        height: 34px;
      }
      .payment-method .method-text {
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>

  <!-- Back to Home -->
  <a href="index.html" class="pay-back-link">
    <i class="fas fa-arrow-left"></i> Home
  </a>

  <!-- Toast Notification -->
  <div class="toast-notification" id="toastNotification"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p>Processing payment...</p>
  </div>

  <!-- Payment Card -->
  <div class="topup-container">
    <div class="topup-card">

      <!-- Header -->
      <div class="topup-card-header">
        <div class="header-logo">
          <i class="fas fa-lock"></i>
        </div>
        <h4>Make Payment</h4>
        <p>Apex Breez — Secure Checkout</p>
      </div>

      <!-- Body -->
      <div class="topup-card-body">

        <!-- Full Name -->
        <div class="pay-form-group">
          <label for="payFullName">Full Name <span class="pay-required">*</span></label>
          <input type="text" id="payFullName" placeholder="Enter your full name" required>
        </div>

        <!-- Select Service -->
        <div class="pay-form-group">
          <label for="payService">Select Service <span class="pay-required">*</span></label>
          <div class="select-wrapper">
            <select id="payService" name="service" required>
              <option value="">-- Choose a service --</option>
              <option value="Business Registration">Business Registration</option>
              <option value="Website Development">Website Development</option>
              <option value="Accounting Systems">Accounting Systems</option>
              <option value="Business Advisory">Business Advisory</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <!-- Amount — GHS inline with input -->
        <div class="pay-form-group">
          <label for="payAmount">Amount (GHS) <span class="pay-required">*</span></label>
          <div class="pay-input-group">
            <span class="pay-input-prefix">GHS</span>
            <input type="number" id="payAmount" placeholder="Enter amount" min="1" step="0.01" required>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="section-label">Payment Method</div>
        <div class="payment-methods">

          <div class="method-divider">Mobile Money</div>

          <div class="payment-method" data-method="mtn_momo">
            <div class="radio-dot"></div>
            <img class="method-img" src="logos/mtn.jpg" alt="MTN">
            <div class="method-text">MTN Mobile Money</div>
          </div>

          <div class="payment-method" data-method="telecel_cash">
            <div class="radio-dot"></div>
            <img class="method-img" src="logos/telecel.webp" alt="Telecel">
            <div class="method-text">Telecel Cash</div>
          </div>

          <div class="payment-method" data-method="airteltigo">
            <div class="radio-dot"></div>
            <img class="method-img" src="logos/airteltigo.jpeg" alt="AirtelTigo">
            <div class="method-text">AirtelTigo Money</div>
          </div>

          <div class="method-divider">Card</div>

          <div class="payment-method" data-method="card">
            <div class="radio-dot"></div>
            <div class="method-logos">
              <svg class="card-brand" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg">
                <rect width="48" height="32" rx="4" fill="#1A1F71"/>
                <path d="M19.5 21.5h-3l1.9-10.5h3l-1.9 10.5zm12.7-10.3c-.6-.2-1.5-.5-2.7-.5-3 0-5.1 1.5-5.1 3.6 0 1.6 1.5 2.5 2.6 3 1.2.6 1.6.9 1.6 1.4 0 .8-.9 1.1-1.8 1.1-1.2 0-1.8-.2-2.8-.6l-.4-.2-.4 2.5c.7.3 2 .6 3.4.6 3.2 0 5.2-1.5 5.2-3.7 0-1.2-.8-2.2-2.4-2.9-1-.5-1.6-.9-1.6-1.4 0-.5.5-1 1.6-1 1 0 1.7.2 2.2.4l.3.1.4-2.4zm7.8 0h-2.3c-.7 0-1.3.2-1.6.9l-4.5 9.9h3.2l.6-1.7h3.8l.4 1.7h2.8l-2.4-10.8zm-3.6 7c.2-.6 1.2-3.1 1.2-3.1l.1.3c0 0 .6-1.5.8-2l.4 1.8s.6 2.8.7 3h-3.2zm-17.6-7l-3 7.1-.3-1.6c-.5-1.8-2.2-3.7-4-4.6l2.7 9.6h3.2l4.8-10.5h-3.4z" fill="#fff"/>
                <path d="M8.3 11.2H3.2l-.1.3c4 1 6.6 3.4 7.7 6.3l-1.1-5.5c-.2-.7-.7-.9-1.4-1.1z" fill="#F9A533"/>
              </svg>
              <svg class="card-brand" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg">
                <rect width="48" height="32" rx="4" fill="#1A1F71"/>
                <circle cx="18" cy="16" r="8" fill="#EB001B" opacity="0.9"/>
                <circle cx="30" cy="16" r="8" fill="#F79E1B" opacity="0.9"/>
                <path d="M24 10.7a8 8 0 0 1 0 10.6 8 8 0 0 1 0-10.6z" fill="#FF5F00"/>
              </svg>
            </div>
            <div class="method-text">Visa / Mastercard</div>
          </div>

          <div class="method-divider">Bank Transfer</div>

          <div class="payment-method disabled" data-method="bank_transfer">
            <div class="radio-dot"></div>
            <div style="width:40px;height:40px;border-radius:6px;background:#e9ecef;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <i class="fas fa-university" style="font-size:1.1rem;color:#6c757d;"></i>
            </div>
            <div class="method-text">Bank Transfer</div>
            <span class="coming-soon-badge">Coming Soon</span>
          </div>

        </div>

        <!-- Mobile Number — +233 inline with input -->
        <div class="pay-form-group" id="phoneFieldGroup">
          <label for="paymentNumber" id="phoneLabel">Mobile Money Number</label>
          <div class="pay-input-group">
            <span class="pay-input-prefix">+233</span>
            <input type="tel" id="paymentNumber" placeholder="24 XXX XXXX" maxlength="10">
          </div>
        </div>

        <!-- Email -->
        <div class="pay-form-group" id="emailFieldGroup">
          <label for="paymentEmail" id="emailLabel">Email (Optional)</label>
          <input type="email" id="paymentEmail" placeholder="your@email.com">
        </div>

        <!-- Process Button -->
        <button type="button" class="btn btn-process" id="processPaymentBtn">
          <i class="fas fa-lock me-2"></i>Process Payment
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function () {
        var selectedMethod = null;

        var fullNameInput = document.getElementById('payFullName');
        var serviceSelect = document.getElementById('payService');
        var amountInput = document.getElementById('payAmount');
        var paymentMethods = document.querySelectorAll('.payment-method:not(.disabled)');
        var paymentNumber = document.getElementById('paymentNumber');
        var paymentEmail = document.getElementById('paymentEmail');
        var phoneFieldGroup = document.getElementById('phoneFieldGroup');
        var phoneLabel = document.getElementById('phoneLabel');
        var emailLabel = document.getElementById('emailLabel');
        var processBtn = document.getElementById('processPaymentBtn');
        var loadingOverlay = document.getElementById('loadingOverlay');
        var toastEl = document.getElementById('toastNotification');

        /* Friendly names for each method */
        var methodNames = {
            'mtn_momo': 'MTN Mobile Money',
            'telecel_cash': 'Telecel Cash',
            'airteltigo': 'AirtelTigo Money',
            'card': 'Visa / Mastercard'
        };

        /* --- Toast --- */
        function showToast(message, type) {
            type = type || 'info';
            toastEl.textContent = message;
            toastEl.className = 'toast-notification ' + type;
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            setTimeout(function () {
                toastEl.classList.remove('show');
            }, 3500);
        }

        /* --- Loading --- */
        function showLoading() { loadingOverlay.classList.add('active'); }
        function hideLoading() { loadingOverlay.classList.remove('active'); }

        /* --- Method Selection --- */
        for (var i = 0; i < paymentMethods.length; i++) {
            paymentMethods[i].addEventListener('click', function () {
                for (var j = 0; j < paymentMethods.length; j++) {
                    paymentMethods[j].classList.remove('active');
                }
                this.classList.add('active');
                selectedMethod = this.getAttribute('data-method');
                toggleFieldsForMethod(selectedMethod);
            });
        }

        /* --- Toggle Fields Based on Method --- */
        function toggleFieldsForMethod(method) {
            if (method === 'card') {
                phoneFieldGroup.style.display = 'none';
                emailLabel.innerHTML = 'Email <span class="pay-required">*</span>';
            } else {
                phoneFieldGroup.style.display = '';
                phoneLabel.textContent = methodNames[method] + ' Number';
                emailLabel.innerHTML = 'Email (Optional)';
                paymentNumber.focus();
            }
        }

        /* --- Validate --- */
        function validate() {
            if (!fullNameInput.value.trim()) {
                showToast('Please enter your full name.', 'error');
                fullNameInput.focus();
                return false;
            }
            if (!serviceSelect.value) {
                showToast('Please select a service.', 'error');
                serviceSelect.focus();
                return false;
            }
            if (!amountInput.value || parseFloat(amountInput.value) < 1) {
                showToast('Please enter a valid amount.', 'error');
                amountInput.focus();
                return false;
            }
            if (!selectedMethod) {
                showToast('Please select a payment method.', 'error');
                return false;
            }
            if (selectedMethod !== 'card') {
                var phone = paymentNumber.value.trim().replace(/\s/g, '');
                if (!phone || phone.length < 9) {
                    showToast('Please enter a valid mobile money number.', 'error');
                    paymentNumber.focus();
                    return false;
                }
            }
            if (selectedMethod === 'card') {
                var email = paymentEmail.value.trim();
                if (!email || !email.includes('@') || !email.includes('.')) {
                    showToast('Please enter a valid email for card payment.', 'error');
                    paymentEmail.focus();
                    return false;
                }
            }
            return true;
        }

        /* --- Format phone: ensure 0-prefixed local format --- */
        function formatPhone(raw) {
            var num = raw.replace(/\s/g, '');
            if (num.charAt(0) !== '0') {
                num = '0' + num;
            }
            return num;
        }

        /* --- Process Payment --- */
        processBtn.addEventListener('click', function () {
            if (!validate()) return;

            showLoading();
            processBtn.disabled = true;

            /* Build phone value */
            var phoneValue = '';
            if (selectedMethod !== 'card') {
                phoneValue = formatPhone(paymentNumber.value);
            }

            /* Payload — matches existing backend expectations */
            var formData = {
                full_name: fullNameInput.value.trim(),
                phone: phoneValue,
                email: paymentEmail.value.trim(),
                service: serviceSelect.value,
                amount: parseFloat(amountInput.value),
                payment_method: selectedMethod
            };

            /* Send to existing Paystack backend — server-side initialization */
            fetch('https://apexbreez-payment.apexbreez.com/initialize_payment.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(function (response) { return response.json(); })
            .then(function (data) {
                if (data.status === 'success' && data.data.authorization_url) {
                    /* Redirect to Paystack hosted payment page */
                    window.location.href = data.data.authorization_url;
                } else {
                    hideLoading();
                    processBtn.disabled = false;
                    showToast(data.message || 'Could not initialize payment. Please try again.', 'error');
                }
            })
            .catch(function (error) {
                hideLoading();
                processBtn.disabled = false;
                console.error('Fetch Error:', error);
                showToast('A network error occurred. Please check your connection.', 'error');
            });
        });

        /* --- Reset Form --- */
        function resetForm() {
            selectedMethod = null;
            fullNameInput.value = '';
            serviceSelect.value = '';
            amountInput.value = '';
            for (var m = 0; m < paymentMethods.length; m++) {
                paymentMethods[m].classList.remove('active');
            }
            paymentNumber.value = '';
            paymentEmail.value = '';
            phoneFieldGroup.style.display = '';
            phoneLabel.textContent = 'Mobile Money Number';
            emailLabel.innerHTML = 'Email (Optional)';
        }
    })();
  </script>
</body>
</html>
